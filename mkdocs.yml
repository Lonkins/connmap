site_name: connmap
site_description: Data-flow threat mapping for local AI-assistant connectors
site_url: https://lonkins.github.io/connmap/
repo_url: https://github.com/Lonkins/connmap
repo_name: Lonkins/connmap
copyright: Copyright &copy; 2026 Tom Price — Apache-2.0

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_style: google

not_in_nav: |
  /adr/*.md

nav:
  - Home: index.md
  - Trust taxonomy: trust-taxonomy.md
  - Threat catalog: threat-catalog.md
  - Worked example: example.md
  - CLI reference: cli.md
  - Writing an importer: importers.md
  - Design decisions: decisions.md
  - API reference: api.md
