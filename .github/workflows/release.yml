name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: uv build

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Enabled once PyPI Trusted Publishing is configured; set the repo variable
    # PUBLISH_TO_PYPI=true to turn it on. Until then this job is skipped, so a
    # tag can be cut without a failing run. See CONTRIBUTING.md ("Releasing").
    if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
    environment:
      name: pypi
      url: https://pypi.org/project/connmap/
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no stored token
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
